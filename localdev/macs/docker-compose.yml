services:
  keycloak:
    container_name: keycloak
    image: sso-keycloak:26.2-4
    command: start-dev
    depends_on:
      - postgres
    ports:
      - 8080:8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_LOG: console
      KC_LOG_LEVEL: INFO
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8080/auth/
      KC_HOSTNAME_ADMIN: http://localhost:8080/auth/
      PPID_API_TOKEN_URL: https://idsit.gov.bc.ca/oauth2/token
      PPID_OTP_ISSUER:
      PPID_CLIENT_ID:
      PPID_CLIENT_SECRET:
      PPID_API_URL: https://idsit.gov.bc.ca/iis-apis/v1/ppids
      RBA_API_URL: http://localhost:8081/event # http://host.docker.internal:8081/event - required if container needs to access host machine
      RBA_TOKEN_URL: https://dev.sandbox.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/token
      RBA_CLIENT_ID:
      RBA_CLIENT_SECRET:
    volumes:
      - ../../docker/keycloak/extensions-26/themes/src/main/resources/theme:/opt/keycloak/themes/
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    restart: on-failure
    tty: true
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
