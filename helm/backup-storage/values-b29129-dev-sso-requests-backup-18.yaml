nameOverride: sso-requests-backup-storage-18
fullnameOverride: sso-requests-backup-storage-18

image:
  repository: ghcr.io/bcgov/backup-container
  tag: 2.12.0
  pullPolicy: Always

backupConfig: |
  sso-requests-patroni:5432/ssorequests
  0 1 * * * default ./backup.sh -s
  0 4 * * * default ./backup.sh -I -s -v all

db:
  secretName: sso-requests-patroni-appusers
  usernameKey: username-appuser1
  passwordKey: password-appuser1

persistence:
  backup:
    size: 700Mi
  verification:
    size: 300Mi

env:
  ENVIRONMENT_FRIENDLY_NAME:
    value: 'CSS Application Sandbox Backup'
  ENVIRONMENT_NAME:
    value: b29129-dev
  WEBHOOK_URL:
    # value: '<<WEBHOOK URL FOR ROCKETCHAT>>'
    secure: true

  DAILY_BACKUPS:
    value: '3'
  WEEKLY_BACKUPS:
    value: '2'
  MONTHLY_BACKUPS:
    value: '1'
