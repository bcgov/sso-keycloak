nameOverride: realm-reg-backup-storage-18
fullnameOverride: realm-reg-backup-storage-18

image:
  repository: ghcr.io/bcgov/backup-container
  tag: 2.12.0
  pullPolicy: Always

backupConfig: |
  realm-registry-patroni:5432/realm_registry
  0 1 * * * default ./backup.sh -s
  0 4 * * * default ./backup.sh -I -s -v all

db:
  secretName: realm-registry-patroni-appusers
  usernameKey: username-appuser1
  passwordKey: password-appuser1

persistence:
  backup:
    size: 2Gi

env:
  ENVIRONMENT_FRIENDLY_NAME:
    value: 'Realm Registry Production Backup'
  ENVIRONMENT_NAME:
    value: c6af30-prod
  WEBHOOK_URL:
    # value: '<<WEBHOOK URL FOR ROCKETCHAT>>'
    secure: true

  DAILY_BACKUPS:
    value: '3'
  WEEKLY_BACKUPS:
    value: '2'
  MONTHLY_BACKUPS:
    value: '1'
